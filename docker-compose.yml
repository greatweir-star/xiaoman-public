version: "3.8"

services:
  xiaoman-backend:
    build:
      context: ./backend-py
    ports:
      - "18789:18789"
    volumes:
      - ./backend-py/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - XIAOMAN_DATA_DIR=/app/data
      - XIAOMAN_ENABLE_DREAMING_SCHEDULER=false
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.pipellm.ai/openai/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}

  xiaoman-web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - xiaoman-backend
