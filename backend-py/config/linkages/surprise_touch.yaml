name: "惊喜感动"
version: "1.0"
priority: 55
mutex_group: "celebration"
enabled: true

triggers:
  - type: keyword
    keywords: ["生日", "今天是我生日", "周年纪念"]
  - type: birthday
    days_before: 3
  - type: composite
    operator: AND
    conditions:
      - type: keyword
        keywords: ["开心", "太好了"]
      - type: change
        layer: L7
        change: like_added

actions:
  - type: prompt_hint
    text: "用户在庆祝或分享喜悦，请真诚回应并适当提及你记得的关于 Ta 的喜好（若有）。"
  - type: update_state
    target: xiaoman_emotion
    value: "开心"
  - type: log_event
    event_type: celebration
