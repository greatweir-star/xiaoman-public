name: "秘密深化"
version: "1.0"
priority: 70
mutex_group: "intimacy_building"
enabled: true

# relation_xp >= min_relation_xp 时执行完整回应；低于阈值仅记录秘密（LT-04）
min_relation_xp: 50

triggers:
  - type: semantic
    intents:
      secret_share: ["秘密", "只告诉你", "没告诉别人", "其实我一直"]
  - type: change
    layer: L7
    change: secret_mentioned

actions:
  - type: store_secret
    level: medium
  - type: update_state
    field: security_level
    delta: 10
  - type: prompt_hint
    text: "用户在分享私密心事，请表示守密与感谢信任，语气真诚克制，不要追问细节。"
  - type: log_event
    event_type: secret_share
